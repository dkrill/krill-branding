<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="280" viewBox="0 0 1000 280" role="img">
  <title>Krill Hosting Colorado logo — Teal and warm gold variation</title>
  <desc>Flatirons badge in dark teal with a radiant warm-gold moon, soft curved slabs and gold rim light.</desc>
  <defs>
    <linearGradient id="lbSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06202a"/><stop offset="0.55" stop-color="#0d3a42"/><stop offset="1" stop-color="#134a52"/>
    </linearGradient>
    <radialGradient id="lbMoon" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#fff0c8"/><stop offset="1" stop-color="#eaa23a"/></radialGradient>
    <linearGradient id="lbAcc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8c95c"/><stop offset="1" stop-color="#e0912a"/></linearGradient>
    <clipPath id="lbClip"><rect x="30" y="30" width="220" height="220" rx="44"/></clipPath>
  </defs>
  <g clip-path="url(#lbClip)">
    <rect x="30" y="30" width="220" height="220" fill="url(#lbSky)"/>
    <circle cx="188" cy="92" r="40" fill="#eeb24a" opacity="0.18"/>
    <circle cx="188" cy="92" r="26" fill="url(#lbMoon)"/>
    <circle cx="178" cy="86" r="26" fill="#0d3a42" opacity="0.32"/>
    <g fill="#f8d488"><circle cx="70" cy="70" r="1.8"/><circle cx="110" cy="58" r="1.3"/><circle cx="150" cy="80" r="1.6"/><circle cx="90" cy="110" r="1.2"/><circle cx="60" cy="130" r="1.5"/></g>
    <path d="M104 252 C 132 196 152 148 163 126 Q 168 116 175 128 C 184 168 190 210 196 252 Z" fill="#0a2c33"/>
    <path d="M150 252 C 178 188 198 138 208 120 Q 213 111 219 122 C 224 168 227 210 231 252 Z" fill="#0a2c33"/>
    <g fill="none" stroke="url(#lbAcc)" stroke-linecap="round">
      <path d="M166 130 C 148 172 130 210 116 252" stroke-width="6" opacity="0.85"/>
      <path d="M211 124 C 196 166 182 210 170 252" stroke-width="5" opacity="0.65"/>
    </g>
    <rect x="30" y="226" width="220" height="24" fill="#061a1f"/>
  </g>
  <rect x="30" y="30" width="220" height="220" rx="44" fill="none" stroke="url(#lbAcc)" stroke-width="3"/>
  <text x="290" y="130" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="76" font-weight="700" letter-spacing="2" fill="#eefaf7">KRILL</text>
  <text x="500" y="130" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="76" font-weight="300" letter-spacing="2" fill="#f2b84a">HOSTING</text>
  <rect x="292" y="150" width="470" height="3" rx="1.5" fill="url(#lbAcc)"/>
  <text x="294" y="192" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="30" font-weight="400" letter-spacing="12" fill="#5fb8b0">COLORADO</text>
  <text x="580" y="192" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="400" letter-spacing="4" fill="#3f7f86">GAME SERVERS</text>
</svg>
