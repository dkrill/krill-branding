<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img">
  <title>Krill Hosting Colorado — Cool alpine teal and warm gold variation background</title>
